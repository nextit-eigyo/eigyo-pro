name: 地域ニュース自動更新

# ⏸ 一時停止中（API従量課金が発生するため。会社経費の承認後に有効化する）
# 有効化方法: 下の schedule の行のコメントを外す＋ ANTHROPIC_API_KEY を GitHub Secret に登録。
#   cron "0 22 * * 0,3" = 月・木 朝7:00 JST（GitHubのcronはUTC基準: 22:00 UTC 日/水）
on:
  # schedule:
  #   - cron: "0 22 * * 0,3"
  workflow_dispatch: {}

permissions:
  contents: write

# 多重起動を防ぐ
concurrency:
  group: region-news
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Node セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 依存インストール
        run: npm install @anthropic-ai/sdk

      - name: ニュース収集
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node tools/gen-region-news.mjs

      - name: 変更があればコミット＆プッシュ
        run: |
          git config user.name "eigyo-news-bot"
          git config user.email "actions@users.noreply.github.com"
          if [ -n "$(git status --porcelain data/region-news.json)" ]; then
            git add data/region-news.json
            git commit -m "chore(news): 地域ニュース自動更新 $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            git push
            echo "更新しました"
          else
            echo "変更なし"
          fi
